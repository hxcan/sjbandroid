name: Build APK

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

env:
  GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx2048m"

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'gradle'

    - name: Cache Gradle packages
      uses: actions/cache@v3
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-

    - name: Grant execute permission to gradlew
      run: chmod +x gradlew

    - name: Setup Android SDK
      uses: android-actions/setup-android@v2

    - name: Build Debug APK
      run: ./gradlew assembleDebug

    - name: Build Release APK (with signing)
      run: ./gradlew assembleRelease
      env:
        SIGNING_KEY_STORE_PATH: keystore.31/debug.keystore
        # Note: For production releases, use GitHub Secrets instead of hardcoding
        # GITHUB_TOKEN should be used for uploading artifacts
        # KEYSTORE_PASSWORD, KEY_ALIAS, etc. should come from secrets

    - name: Upload Debug APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: sjbandroid-debug-apk
        path: app/build/outputs/apk/debug/app-debug.apk
        retention-days: 30

    - name: Upload Release APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: sjbandroid-release-apk
        path: app/build/outputs/apk/release/app-release.apk
        retention-days: 30

    - name: Send Failure Notification (Placeholder)
      if: failure()
      run: |
        echo "Build failed! Check logs at: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
        # TODO: Implement email or DingTalk notification here
        # Example: curl -d "Build failed in ${{ github.repository }}" https://webhook.url